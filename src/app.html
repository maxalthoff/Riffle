<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Riffle</title>
    <style>
      :root {
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --success: #22c55e;
        --success-hover: #16a34a;
        --danger: #ef4444;
        --text: #1f2937;
        --text-secondary: #6b7280;
        --surface: #f9fafb;
        --border: #e5e7eb;
        --bg: #f5f5f4;
        --card: #ffffff;
        --radius: 6px;
        --shadow: 0 1px 3px rgba(0,0,0,0.06);
        --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --input-border: #d1d5db;
        --input-bg: #ffffff;
        --zebra: #fafaf9;
        --hover-bg: #f5f5f4;
      }

      [data-theme="dark"] {
        --text: #e5e5e5;
        --text-secondary: #9ca3af;
        --surface: #2e2e2e;
        --border: #393939;
        --bg: #1a1a1a;
        --card: #242424;
        --shadow: 0 1px 3px rgba(0,0,0,0.3);
        --input-border: #4a4a4a;
        --input-bg: #2e2e2e;
        --zebra: #262626;
        --hover-bg: #333;
      }

      body {
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        margin: 0;
      }

      [data-theme="dark"] input,
      [data-theme="dark"] select,
      [data-theme="dark"] button {
        background: var(--input-bg);
        color: var(--text);
      }

      [data-theme="dark"] .manage-panel,
      [data-theme="dark"] .dialog {
        background: var(--card);
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
